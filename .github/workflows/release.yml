name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Package release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create integration zip
        run: |
          cd custom_components/comelit_man
          zip -r ../../comelit_man.zip .
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: comelit_man.zip
